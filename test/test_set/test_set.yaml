  - name: online_gsa_mla
    platform: vllm_npu

    server_start_config:
      gpu_count: 1
      node_count: 1
      server_port: 9527
      master_start_command: |
        vllm serve /models/DeepSeek-V2-Lite-Chat
        --served-model-name DeepSeek-V2-Lite-Chat
        --block-size 128
        --tensor-parallel-size 1
        --data-parallel-size 1
        --gpu-memory-utilization 0.87
        --max-model-len 70000
        --trust-remote-code
      ucm_config: |
        ucm_connectors:
          - ucm_connector_name: "UcmPipelineStore"
            ucm_connector_config:
              store_pipeline: "Empty"
              share_buffer_enable: true

        ucm_sparse_config:
          GSAOnDevice: {}
      environment:
        - VLLM_SERVER_DEV_MODE: "1"
        - ENABLE_SPARSE: "1"
        - VLLM_HASH_ATTENTION: "1"
        - ENABLE_UCM_PATCH: "1"

    pytest_config:
      api_model_name: DeepSeek-V2-Lite-Chat
      test_params: "--feature=fvt_gsa_test -k test_online_gsa_mla"

